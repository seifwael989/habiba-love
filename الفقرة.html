<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>صفحة الاسئلة</title>
<style>
body{
    font-family: Arial, sans-serif;
    direction: rtl;
    background: linear-gradient(135deg,#ffd6e7,#fff0f6);
    display:flex;
    justify-content:center;
    padding:40px;
    margin:0;
}
.container{
    background:white;
    padding:35px;
    border-radius:30px;
    width:90%;
    max-width:700px;
    box-shadow:0 0 25px rgba(255,105,180,0.2);
    position:relative;
    overflow:hidden;
}
.container::before{
    content:"❤";
    position:absolute;
    font-size:120px;
    opacity:0.05;
    top:-20px;
    left:-10px;
}
h1{
    text-align:center;
    color:#d63384;
    margin-bottom:25px;
}
.question{
    margin:18px 0;
    padding:18px;
    background:#fff5fa;
    border-radius:18px;
    border:1px solid #ffd6e7;
    transition:0.3s;
}
.question:hover{
    transform:scale(1.02);
    box-shadow:0 0 10px rgba(255,105,180,0.15);
}
</style>
</head>
<body>
<div class="container">
<h1>💖 اسئلة مفاجئه💖</h1>

<div class="question">
<p>1 - ايه اكتر حاجه انا بحبها تحسيها بتبعدك عني</p>
<input type="text" style="width:100%;padding:10px;border-radius:10px;border:1px solid #ffd6e7;">
</div>

<div class="question">
<p>2 - ايه رأيك ف الجبنه القديمه</p>
<input type="text" style="width:100%;padding:10px;border-radius:10px;border:1px solid #ffd6e7;">
</div>

<div class="question">
<p>3 - اوصفيني بكلمه </p>
<input type="text" style="width:100%;padding:10px;border-radius:10px;border:1px solid #ffd6e7;">
</div>

<div style="text-align:center;margin-top:25px;">
<a href="love.html" style="display:inline-block;background:#d63384;color:white;padding:12px 30px;border-radius:15px;text-decoration:none;font-weight:bold;">➡️ خلصت يا مستر</a>
</div>

</div>
</body>
</html>
